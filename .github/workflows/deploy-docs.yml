name: Deploy lat.md docs to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "lat.md/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout devbench repo
        uses: actions/checkout@v4

      - name: Clone Quartz
        run: |
          git clone --depth 1 https://github.com/jackyzha0/quartz.git /tmp/quartz

      - name: Copy lat.md content into Quartz
        run: |
          # Clear default content
          rm -rf /tmp/quartz/content/*
          # Copy all lat.md files
          cp lat.md/*.md /tmp/quartz/content/
          # Rename lat.md to index.md for the homepage
          mv /tmp/quartz/content/lat.md /tmp/quartz/content/index.md

      - name: Apply Quartz config
        run: |
          # Copy our custom config files
          cp docs-site/quartz.config.ts /tmp/quartz/quartz.config.ts
          cp docs-site/quartz.layout.ts /tmp/quartz/quartz.layout.ts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Quartz dependencies
        working-directory: /tmp/quartz
        run: npm ci

      - name: Build Quartz site
        working-directory: /tmp/quartz
        run: npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/quartz/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
