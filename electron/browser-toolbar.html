<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #161b22;
    display: flex;
    flex-direction: column;
  }
  .nav-row {
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 4px;
    height: 41px;
    flex-shrink: 0;
    border-bottom: 1px solid #30363d;
  }
  .btn {
    background: none; border: none; color: #8b949e; cursor: pointer;
    padding: 4px 6px; border-radius: 3px; font-size: 14px; flex-shrink: 0;
    line-height: 1;
  }
  .btn:hover { color: #e6edf3; background: #21262d; }
  .url-form {
    flex: 1; display: flex; align-items: center;
    background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
    padding: 2px 4px; transition: border-color 0.15s;
  }
  .url-form:focus-within { border-color: #58a6ff; }
  .url-input {
    flex: 1; background: transparent; border: none; color: #e6edf3;
    font-size: 13px; font-family: inherit; padding: 4px 6px; outline: none;
    min-width: 0;
  }
  .url-input::placeholder { color: #484f58; }
  .btn svg { vertical-align: middle; }
  .save-btn { display: none; font-size: 15px; }
  .save-btn.visible { display: inline-flex; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .spin { animation: spin 1s linear infinite; }

  /* ── View mode toggle ─────────────────────────────────────── */
  .view-toggle {
    display: flex;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 5px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .vt-btn {
    padding: 3px 6px;
    font-size: 13px;
    border-radius: 0;
    color: #484f58;
  }
  .vt-btn:hover { color: #e6edf3; background: #21262d; }
  .vt-btn.active { background: #21262d; color: #58a6ff; }

  /* ── Tab bar ──────────────────────────────────────────────── */
  .tab-bar {
    display: none;
    align-items: center;
    gap: 2px;
    padding: 3px 10px 4px;
    flex-shrink: 0;
    overflow-x: auto;
  }
  .tab-bar.visible { display: flex; }
  .tab {
    padding: 3px 10px;
    background: none;
    border: 1px solid transparent;
    border-radius: 5px;
    font-size: 12px;
    font-weight: 500;
    color: #8b949e;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.12s;
    font-family: inherit;
  }
  .tab:hover {
    background: #21262d;
    color: #e6edf3;
  }
  .tab.active {
    background: #21262d;
    color: #58a6ff;
    border-color: #30363d;
  }
  .tab.mr-tab {
    font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    font-weight: 600;
    font-size: 11px;
  }
</style>
</head>
<body>
  <div class="nav-row">
    <button class="btn" id="back" title="Back"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></button>
    <button class="btn" id="forward" title="Forward"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></button>
    <button class="btn" id="refresh" title="Refresh"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg></button>
    <form class="url-form" id="urlForm">
      <input class="url-input" id="url" type="text" placeholder="http://devbox:8000" spellcheck="false">
    </form>
    <div class="view-toggle" id="viewToggle">
      <button class="btn vt-btn active" id="viewDesktop" title="Desktop view"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/></svg></button>
      <button class="btn vt-btn" id="viewMobile" title="Mobile view"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg></button>
    </div>
    <button class="btn save-btn" id="save" title="Save as project default URL"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7"/><path d="M7 3v4a1 1 0 0 0 1 1h7"/></svg></button>
    <button class="btn" id="close" title="Close browser (Ctrl+Shift+B)"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
  </div>
  <div class="tab-bar" id="tabBar"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    const api = window.toolbarAPI;

    let defaultUrl = "";

    function normalizeUrl(u) {
      u = (u || "").trim();
      if (!u) return "";
      return /^https?:\/\//i.test(u) ? u : "http://" + u;
    }

    function updateSave() {
      const cur = normalizeUrl($("url").value);
      const isDirty = cur && cur !== normalizeUrl(defaultUrl);
      $("save").classList.toggle("visible", !!isDirty);
    }

    $("back").onclick = () => api.goBack();
    $("forward").onclick = () => api.goForward();
    $("refresh").onclick = () => api.refresh();
    $("close").onclick = () => api.close();
    $("save").onclick = () => api.saveUrl(normalizeUrl($("url").value));

    $("urlForm").onsubmit = (e) => {
      e.preventDefault();
      const url = normalizeUrl($("url").value);
      if (url) api.navigate(url);
    };

    $("url").addEventListener("input", updateSave);

    api.onUrlChanged((url) => {
      $("url").value = url;
      updateSave();
    });

    api.onLoadingChanged((loading) => {
      $("refresh").innerHTML = loading
        ? '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>'
        : '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>';
    });

    api.onDefaultUrlChanged((url) => {
      defaultUrl = url;
      updateSave();
    });

    // ── View mode toggle ────────────────────────────────────────
    $("viewDesktop").onclick = () => {
      $("viewDesktop").classList.add("active");
      $("viewMobile").classList.remove("active");
      api.setViewMode("desktop");
    };
    $("viewMobile").onclick = () => {
      $("viewMobile").classList.add("active");
      $("viewDesktop").classList.remove("active");
      api.setViewMode("mobile");
    };
    api.onViewModeChanged((mode) => {
      $("viewDesktop").classList.toggle("active", mode === "desktop");
      $("viewMobile").classList.toggle("active", mode === "mobile");
    });

    // ── Tabs ──────────────────────────────────────────────────
    api.onTabsChanged((tabs) => {
      const bar = $("tabBar");
      if (!tabs || tabs.length === 0) {
        bar.classList.remove("visible");
        bar.innerHTML = "";
        return;
      }
      bar.classList.add("visible");
      bar.innerHTML = "";
      for (const tab of tabs) {
        const btn = document.createElement("button");
        btn.className = "tab" + (tab.active ? " active" : "") + (tab.id !== "app" ? " mr-tab" : "");
        btn.textContent = tab.label;
        btn.title = tab.id === "app" ? "Project app" : tab.id;
        btn.onclick = () => api.switchTab(tab.id);
        bar.appendChild(btn);
      }
    });
  </script>
</body>
</html>
